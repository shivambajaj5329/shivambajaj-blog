baseURL = 'https://shivambajaj.com/'
languageCode = 'en-us'
title = 'Shivam Bajaj'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

[minify]
disableXML = true
minifyOutput = true

[params]
mainSections = ["posts"]
env = "production"
title = "Shivam Bajaj"
description = "Writing about system design, distributed systems, and software architecture"
keywords = ["Software Engineering", "System Design", "Distributed Systems", "Architecture"]
author = "Shivam Bajaj"
images = ["/profile.jpg"]
DateFormat = "January 2, 2006"
defaultTheme = "dark"
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[params.homeInfoParams]
Title = "Hey, I'm Shivam 👋"
Content = "I write about system design, distributed systems, and backend architecture."

[[params.socialIcons]]
name = "github"
url = "https://github.com/shivambajaj5329"

[[params.socialIcons]]
name = "linkedin"
url = "https://linkedin.com/in/shivbajaj/"

[[params.socialIcons]]
name = "twitter"
url = "https://twitter.com/shivz2cool"

[[params.socialIcons]]
name = "email"
url = "mailto:email@shivambajaj.com"

[params.assets]
favicon = "/favicon.ico"
favicon16x16 = "/favicon-16x16.png"
favicon32x32 = "/favicon-32x32.png"
apple_touch_icon = "/apple-touch-icon.png"

[params.cover]
hidden = true
hiddenInList = true
hiddenInSingle = true

[params.editPost]
URL = "https://github.com/shivambajaj5329/blog/tree/main/content"
Text = "Suggest Changes"
appendFilePath = true

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[menu]
[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 20

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 40

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false
anchorLineNos = false
codeFences = true
guessSyntax = true
hl_Lines = ""
lineAnchors = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
style = "monokai"
tabWidth = 4